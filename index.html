<!DOCTYPE html>
<html>

<head>

<title>Data Lansia</title>

<style>

body{
font-family:Arial;
text-align:center;
}

.menu button{
font-size:30px;
margin:10px;
padding:10px 20px;
}

img{
width:350px;
margin-top:20px;
border-radius:10px;
}

button.nav{
margin:20px;
padding:10px 20px;
font-size:18px;
}

</style>

</head>

<body>

<h1>Data Lansia</h1>

<div class="menu">

<button onclick="pilih('a')">あ</button>
<button onclick="pilih('ka')">か</button>
<button onclick="pilih('sa')">さ</button>
<button onclick="pilih('ta')">た</button>
<button onclick="pilih('na')">な</button>

<br><br>

<button onclick="pilih('ha')">は</button>
<button onclick="pilih('ma')">ま</button>
<button onclick="pilih('ya')">や</button>
<button onclick="pilih('ra')">ら</button>
<button onclick="pilih('wa')">わ</button>

</div>

<br>

<img id="foto">

<br>

<button class="nav" onclick="prev()">Back</button>
<button class="nav" onclick="next()">Next</button>

<script>

let kelompok={
a:["a1.jpg","a2.jpg","a3.jpg"],
ka:["ka1.jpg","ka2.jpg"],
sa:["sa1.jpg"],
ta:["ta1.jpg"],
na:["na1.jpg"],
ha:["ha1.jpg"],
ma:["ma1.jpg"],
ya:["ya1.jpg"],
ra:["ra1.jpg"],
wa:["wa1.jpg"]
}

let data=[]
let index=0

function pilih(huruf){

data=kelompok[huruf]
index=0
tampil()

}

function tampil(){

document.getElementById("foto").src=data[index]

}

function next(){

index++

if(index>=data.length){
index=0
}

tampil()

}

function prev(){

index--

if(index<0){
index=data.length-1
}

tampil()

}

</script>

</body>

</html>
