<!DOCTYPE html>
<html>

<head>

<title>Kelompok あ</title>

<style>

body{
text-align:center;
font-family:Arial;
}

img{
width:350px;
margin-top:20px;
border-radius:10px;
}

button{
padding:10px 20px;
margin:20px;
font-size:18px;
}

</style>

</head>

<body>

<h1>Kelompok あ</h1>

<img id="foto">

<br>

<button onclick="prev()">Back</button>
<button onclick="next()">Next</button>

<script>

let data=[
"a1.jpg",
"a2.jpg",
"a3.jpg",
"a4.jpg"
]

let index=0

function tampil(){
document.getElementById("foto").src=data[index]
}

function next(){

index++

if(index>=data.length){
index=0
}

tampil()

}

function prev(){

index--

if(index<0){
index=data.length-1
}

tampil()

}

tampil()

</script>

</body>
